spring:
  application:
    name: quotebook
  mongodb:
    uri: mongodb://mongodb:27017/quotesdb
    database: quotesdb

app:
  cors:
    allowed-origins: ["http://localhost:4173", "http://localhost"]

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: [health, metrics, prometheus]
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true