spring:
  application:
    name: quotebook
  mongodb:
    uri: mongodb://localhost:27017/quotesdb
    database: quotesdb

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: [health, metrics, prometheus]
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true