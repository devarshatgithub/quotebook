namespace: quotes

ingress:
  enabled: true

mongodb:
  name: mongodb
  image: mongo:6.0
  database: quotesdb
  storage: "1Gi"
  storageName: mongodb-storage
  replicas: 1
  port: 27017

app:
  name: quotesapp
  image:
    repository: ghcr.io/devarshatgithub/quotebook-quotes-app
    tag: latest
    pullPolicy: Never
  replicas: 2
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"