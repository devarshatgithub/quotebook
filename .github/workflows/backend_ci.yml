name: Quotes APP

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'frontend/**'

permissions:
  contents: write
  packages: write

jobs:
  backend-build-and-push:
    runs-on: ubuntu-latest
    services:
      sonarqube:
        image: sonarqube:lts-community
        ports:
          - ${{ vars.SONAR_PORT }}:${{ vars.SONAR_PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Check SonarQube status  
        run: |
          until curl -s http://localhost:${{ vars.SONAR_PORT }}/api/system/status | grep -q '"status":"UP"'; do
            echo "Waiting for SonarQube Status ..."
            sleep 10
          done
          echo "SonarQube is UP"
      
      - name: Build & test with Maven
        run: |
          mvn clean verify sonar:sonar \
            -DskipTests \
            -Dsonar.host.url=http://localhost:${{ vars.SONAR_PORT }} \
            -Dsonar.login=${{ secrets.SONAR_USER }} \
            -Dsonar.password=${{ secrets.SONAR_PASS }} \
            -Dsonar.qualitygate.wait=true
      
      - name: Versioning
        run: |
          VERSION=$(mvn help:evaluate -Dexpression="project.version" -q -DforceStdout)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-quotes-app:latest
            ghcr.io/${{ github.repository }}-quotes-app:${{ env.APP_VERSION }}
            ghcr.io/${{ github.repository }}-quotes-app:${{ github.sha }}