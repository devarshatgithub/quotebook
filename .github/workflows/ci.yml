name: Quotes APP

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    services:
      sonarqube:
        image: sonarqube:lts-community
        ports:
          - ${{ vars.SONAR_PORT }}:${{ vars.SONAR_PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Check SonarQube Status  
        run: |
          until curl -s http://localhost:${{ vars.SONAR_PORT }}/api/system/status | grep -q '"status":"UP"'; do
            echo "Waiting for SonarQube Status ..."
            sleep 10
          done
          echo "SonarQube is UP"
      
      - name: Build & test with Maven
        run: |
          mvn clean verify sonar:sonar \
            -DskipTests \
            -Dsonar.host.url=http://localhost:${{ vars.SONAR_PORT }} \
            -Dsonar.login=${{ secrets.SONAR_USER }} \
            -Dsonar.password=${{ secrets.SONAR_PASSWORD }} \
            -Dsonar.qualitygate.wait=true
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-quotes-app:latest
            ghcr.io/${{ github.repository }}-quotes-app:${{ github.sha }}
